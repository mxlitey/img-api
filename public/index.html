<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谷雨开放API - 图像API服务</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="favicon.png" alt="谷雨开放API Logo" class="logo" />
                <h1>谷雨开放API</h1>
            </div>
            <p class="tagline">高效、稳定的图像API服务</p>
        </header>

        <section class="api-cards">
            <div class="card">
                <h2>必应每日一图</h2>
                <p>获取必应搜索引擎每日更新的精美背景图片。</p>

                <h3>API 地址</h3>
                <div class="endpoint">/bing</div>

                <div class="preview-container">
                    <img class="preview-image" src="/bing" alt="必应每日一图预览">
                </div>
            </div>

            <div class="card">
                <h2>API待上线</h2>
                <p>API待上线</p>

                <h3>API 地址</h3>
                <div class="endpoint">即将上线</div>

                <div class="preview-container">
                    <div class="coming-soon-container">
                        <span class="coming-soon-text">Coming Soon</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>API待上线</h2>
                <p>API待上线</p>

                <h3>API 地址</h3>
                <div class="endpoint">即将上线</div>

                <div class="preview-container">
                    <div class="coming-soon-container">
                        <span class="coming-soon-text">Coming Soon</span>
                    </div>
                </div>
            </div>
        </section>

        <footer>
            <p class="copyright">© 2025 谷雨. 保留所有权利。</p>
        </footer>
    </div>

    <script>
        document.querySelectorAll('.endpoint').forEach(el => {
            const path = el.textContent;
            if (path.startsWith('/')) {
                el.textContent = location.origin + path;
            }
        });
    </script>
</body>
</html>
